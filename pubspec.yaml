name: healthcare
description: "Mobile Healthcare Operations & Analytics Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Charts
  fl_chart: ^0.68.0

  # Typography
  google_fonts: ^6.2.1

  # Date/Number Formatting
  intl: ^0.19.0

  # Loading Skeletons
  shimmer: ^3.0.0

  # Unique IDs
  uuid: ^4.4.0

  # Equality
  equatable: ^2.0.5

  # Icons
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.15.1
  firebase_auth: ^5.6.2
  cloud_firestore: ^5.6.11
  firebase_storage: ^12.4.9
  google_sign_in: ^6.3.0
  google_maps_flutter: ^2.9.0
  geocoding: ^3.0.0
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  pdf: ^3.11.1
  printing: ^5.13.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
